# mise: https://mise.jdx.dev/
# pyproject.toml's `requires-python` stays authoritative.

[tools]
python = "3.14"
uv = "latest"
"cargo:fnox" = "latest"

[env]
# Non-secret config (and any secrets not yet migrated to 1Password) live in
# .env. Secrets from 1Password are injected by `fnox exec` in the tasks that
# need them — see fnox.toml.
_.file = { path = ".env", optional = true }

[tasks.install]
description = "uv sync (all groups)"
run = "uv sync --all-groups"

[tasks.lint]
description = "ruff check + format --check"
run = ["uv run ruff check .", "uv run ruff format --check ."]

[tasks.format]
description = "ruff format + ruff check --fix"
run = ["uv run ruff format .", "uv run ruff check --fix ."]

[tasks.typecheck]
description = "basedpyright lsimons_bot"
run = "uv run basedpyright lsimons_bot"

[tasks.test]
description = "pytest"
run = "uv run pytest"

[tasks.run]
description = "Run the bot (slack run) with secrets from fnox"
run = "fnox exec -- slack run"

[tasks.blog]
description = "Run the blog publisher with secrets from fnox"
run = "fnox exec -- uv run python -m lsimons_bot.blog"

[tasks.ci]
description = "Full CI gate"
depends = ["lint", "typecheck", "test"]
